<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kinneret Sites — Collection Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
/* ─── DESIGN TOKENS ─── */
:root {
  --stone-50:#fafaf9; --stone-100:#f5f5f4; --stone-200:#e7e5e4;
  --stone-300:#d6d3d1; --stone-400:#a8a29e; --stone-500:#78716c;
  --stone-600:#57534e; --stone-700:#44403c; --stone-800:#292524; --stone-900:#1c1917;
  --amber-50:#fffbeb; --amber-100:#fef3c7; --amber-200:#fde68a; --amber-300:#fcd34d;
  --amber-400:#fbbf24; --amber-500:#f59e0b; --amber-600:#d97706; --amber-700:#b45309;
  --green-50:#f0fdf4; --green-100:#dcfce7; --green-500:#22c55e; --green-600:#16a34a;
  --red-50:#fef2f2; --red-100:#fee2e2; --red-500:#ef4444; --red-600:#dc2626;
  --yellow-50:#fefce8; --yellow-100:#fef9c3; --yellow-500:#eab308; --yellow-600:#ca8a04;
  --radius-sm:8px; --radius-md:12px; --radius-lg:14px;
  --shadow-sm:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
  --shadow-md:0 4px 6px rgba(0,0,0,0.07),0 2px 4px rgba(0,0,0,0.04);
  --transition:0.18s ease;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',system-ui,sans-serif;background:var(--stone-100);color:var(--stone-800);line-height:1.5;}
[dir="rtl"]{text-align:right;}

/* ─── HEADER ─── */
.dashboard-header{background:var(--stone-800);color:var(--stone-50);padding:20px 28px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;}
.dashboard-header h1{font-size:1.25rem;font-weight:700;letter-spacing:-0.02em;}
.header-sub{font-size:0.8rem;color:var(--stone-400);margin-top:4px;}
.header-meta{display:flex;gap:16px;font-size:0.8rem;font-family:'JetBrains Mono',monospace;color:var(--stone-400);align-items:center;}
.depth-badge{background:var(--amber-500);color:var(--stone-900);padding:2px 8px;border-radius:4px;font-weight:600;font-size:0.7rem;}

/* ─── TABS ─── */
.tab-bar{display:flex;background:var(--stone-200);border-bottom:2px solid var(--stone-300);overflow-x:auto;padding:0 28px;}
.tab-btn{padding:12px 20px;border:none;background:transparent;font-family:'Inter',sans-serif;font-size:0.85rem;font-weight:500;color:var(--stone-500);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:color var(--transition),border-color var(--transition);}
.tab-btn:hover{color:var(--stone-700);}
.tab-btn.active{color:var(--amber-700);border-bottom-color:var(--amber-500);font-weight:600;}
.tab-content{display:none;padding:28px;max-width:1440px;margin:0 auto;}
.tab-content.active{display:block;}

/* ─── GUIDE BOX (3-zone) ─── */
.guide-box{background:var(--amber-50);border:1px solid var(--amber-200);border-radius:var(--radius-md);margin-bottom:24px;overflow:hidden;}
.guide-header{display:flex;align-items:center;gap:8px;padding:12px 16px;cursor:pointer;user-select:none;}
.guide-icon{width:22px;height:22px;border-radius:50%;background:var(--amber-500);color:white;display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:700;flex-shrink:0;}
.guide-title{font-size:0.82rem;font-weight:600;color:var(--amber-700);flex:1;}
.guide-chevron{font-size:0.7rem;color:var(--amber-600);transition:transform var(--transition);}
.guide-box.open .guide-chevron{transform:rotate(180deg);}
.guide-body{display:none;padding:0 16px 14px 46px;font-size:0.8rem;color:var(--stone-600);line-height:1.6;}
.guide-box.open .guide-body{display:block;}
.guide-body .guide-section{margin-bottom:8px;}
.guide-body .guide-label{font-size:0.68rem;text-transform:uppercase;letter-spacing:0.05em;font-weight:600;color:var(--stone-400);margin-bottom:2px;}
.guide-insight{border-left:3px solid var(--amber-400);background:var(--amber-100);padding:8px 12px;border-radius:0 var(--radius-sm) var(--radius-sm) 0;margin-top:8px;font-size:0.8rem;color:var(--stone-700);}

/* ─── CARDS ─── */
.card{background:white;border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);padding:20px;margin-bottom:20px;transition:box-shadow var(--transition),transform var(--transition);}
.card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px);}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:24px;}
.kpi-card{background:white;border-radius:var(--radius-md);padding:18px;box-shadow:var(--shadow-sm);text-align:center;transition:box-shadow var(--transition),transform var(--transition);}
.kpi-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px);}
.kpi-value{font-family:'JetBrains Mono',monospace;font-size:2rem;font-weight:700;color:var(--amber-600);}
.kpi-value.small{font-size:1.25rem;}
.kpi-label{font-size:0.78rem;color:var(--stone-500);margin-top:4px;font-weight:500;}
.chart-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:20px;}
.chart-card{background:white;border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);padding:20px;transition:box-shadow var(--transition),transform var(--transition);}
.chart-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px);}
.chart-card h3{font-size:0.85rem;font-weight:600;color:var(--stone-600);margin-bottom:12px;}

/* ─── MAP ─── */
#map-container{height:480px;border-radius:var(--radius-md);overflow:hidden;box-shadow:var(--shadow-sm);}
.map-filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
.filter-btn{padding:6px 14px;border:1px solid var(--stone-300);border-radius:var(--radius-sm);background:white;font-family:'Inter',sans-serif;font-size:0.78rem;font-weight:500;color:var(--stone-600);cursor:pointer;transition:all var(--transition);}
.filter-btn:hover{border-color:var(--amber-400);background:var(--amber-50);}
.filter-btn.active{background:var(--amber-500);color:var(--stone-900);border-color:var(--amber-500);font-weight:600;}

/* ─── TABLES ─── */
table{width:100%;border-collapse:collapse;font-size:0.82rem;}
th{text-align:left;padding:10px 12px;font-weight:600;font-size:0.72rem;text-transform:uppercase;letter-spacing:0.04em;color:var(--stone-500);border-bottom:2px solid var(--stone-200);position:sticky;top:0;background:white;z-index:1;}
td{padding:10px 12px;border-bottom:1px solid var(--stone-100);vertical-align:top;}
tr:hover td{background:var(--stone-50);}
.site-link{color:var(--amber-700);cursor:pointer;font-weight:600;text-decoration:none;transition:color var(--transition);}
.site-link:hover{color:var(--amber-600);text-decoration:underline;}
.value-dot{font-size:1.1rem;text-align:center;}
.value-dot.explicit{color:var(--amber-600);}
.value-dot.implied{color:var(--stone-400);}
.value-dot.absent{color:var(--stone-200);}

/* ─── GAPS ─── */
.gap-cell{display:inline-block;min-width:32px;text-align:center;padding:4px 8px;border-radius:4px;font-size:0.75rem;font-weight:600;}
.gap-green{background:var(--green-100);color:var(--green-600);}
.gap-yellow{background:var(--yellow-100);color:var(--yellow-600);}
.gap-red{background:var(--red-100);color:var(--red-600);}

/* ─── STRENGTH ─── */
.strength-badge{display:inline-block;padding:2px 10px;border-radius:6px;font-size:0.75rem;font-weight:600;}
.strength-strong{background:var(--green-100);color:var(--green-600);}
.strength-moderate{background:var(--amber-100);color:var(--amber-700);}
.strength-weak{background:var(--red-100);color:var(--red-600);}

/* ─── VALUE SPEC PANEL ─── */
.value-spec-panel{display:none;background:var(--stone-50);border:1px solid var(--stone-200);border-radius:var(--radius-md);padding:18px;margin-top:16px;animation:fadeIn 0.2s ease;}
.value-spec-panel.open{display:block;}
.value-spec-panel h4{font-size:0.9rem;font-weight:600;color:var(--amber-700);margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;}
.value-spec-item{margin-bottom:10px;padding:10px 14px;background:white;border-radius:var(--radius-sm);border-left:3px solid var(--amber-400);transition:box-shadow var(--transition);}
.value-spec-item:hover{box-shadow:var(--shadow-sm);}
.spec-type{font-weight:600;font-size:0.8rem;color:var(--stone-700);}
.spec-text{font-size:0.82rem;color:var(--stone-600);margin-top:2px;}
.close-btn{background:none;border:1px solid var(--stone-300);border-radius:6px;padding:4px 12px;cursor:pointer;font-size:0.78rem;color:var(--stone-500);font-family:'Inter',sans-serif;transition:all var(--transition);}
.close-btn:hover{background:var(--stone-100);border-color:var(--stone-400);}

/* ─── CLUSTERS ─── */
.cluster-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px;}
.cluster-card{background:white;border-radius:var(--radius-md);box-shadow:var(--shadow-sm);padding:18px;border-left:4px solid var(--amber-400);transition:box-shadow var(--transition),transform var(--transition);}
.cluster-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px);}
.cluster-card h4{font-weight:600;font-size:0.9rem;color:var(--stone-700);margin-bottom:6px;}
.cluster-desc{font-size:0.8rem;color:var(--stone-500);margin-bottom:10px;line-height:1.5;}
.site-tag{display:inline-block;padding:4px 12px;background:var(--amber-100);border-radius:6px;font-size:0.75rem;font-weight:500;color:var(--amber-700);margin:3px 4px 3px 0;cursor:pointer;transition:background var(--transition);}
.site-tag:hover{background:var(--amber-200);}

/* ─── FOOTER COUNTS ─── */
.footer-counts{display:flex;flex-wrap:wrap;gap:8px 16px;padding:12px;background:var(--stone-50);border-radius:0 0 var(--radius-md) var(--radius-md);font-size:0.75rem;font-family:'JetBrains Mono',monospace;color:var(--stone-500);}

/* ─── BACK PILL ─── */
.back-pill{display:inline-flex;align-items:center;gap:4px;padding:5px 14px;margin-bottom:14px;background:var(--amber-100);border:1px solid var(--amber-300);border-radius:6px;font-size:0.78rem;font-weight:500;color:var(--amber-700);cursor:pointer;font-family:'Inter',sans-serif;transition:background var(--transition);}
.back-pill:hover{background:var(--amber-200);}

/* ─── ANIMATIONS ─── */
@keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}
.tab-content.active{animation:fadeIn 0.2s ease;}

/* ─── RESPONSIVE ─── */
@media(max-width:768px){
  .kpi-grid{grid-template-columns:1fr 1fr;}
  .chart-grid{grid-template-columns:1fr;}
  .cluster-grid{grid-template-columns:1fr;}
  .dashboard-header{padding:16px 20px;}
  .tab-content{padding:20px;}
  .tab-bar{padding:0 16px;}
  #map-container{height:360px;}
}
</style>
</head>
<body>

<div class="dashboard-header">
  <div>
    <h1 id="dash-title">Loading…</h1>
    <div class="header-sub">MA-RC Collection Analysis</div>
  </div>
  <div class="header-meta" id="header-meta"></div>
</div>

<div class="tab-bar" id="tab-bar"></div>

<!-- TAB 0: OVERVIEW -->
<div class="tab-content active" id="tab-overview"></div>
<!-- TAB 1: MAP -->
<div class="tab-content" id="tab-map"></div>
<!-- TAB 2: VALUES -->
<div class="tab-content" id="tab-values"></div>
<!-- TAB 3: ARGUMENTS -->
<div class="tab-content" id="tab-arguments"></div>
<!-- TAB 4: GAPS -->
<div class="tab-content" id="tab-gaps"></div>
<!-- TAB 5: CROSS-TABS -->
<div class="tab-content" id="tab-cross-tabs"></div>
<!-- TAB 6: CLUSTERS -->
<div class="tab-content" id="tab-clusters"></div>

<script>
// ═══════════════════════════════════════════════════════
// KINNERET SITES — COLLECTION DASHBOARD v3
// Generated from MA-RC [CA-DB-C] spec
// Data source: kinneret_sites_dataset.json
// ═══════════════════════════════════════════════════════

const VALUE_TYPES = ['Historical','Scientific','Landscape','Community','Intangible','Architectural','Nature','Educational'];
const VALUE_COLORS = {
  Historical:'#b45309', Scientific:'#0369a1', Landscape:'#15803d',
  Community:'#7c3aed', Intangible:'#be185d', Architectural:'#c2410c',
  Nature:'#059669', Educational:'#4338ca'
};
const DISTINCT_COLORS = VALUE_TYPES.map(v => VALUE_COLORS[v]);

const TABS = [
  {id:'overview', label:'Overview'},
  {id:'map', label:'Map'},
  {id:'values', label:'Values'},
  {id:'arguments', label:'Arguments'},
  {id:'gaps', label:'Gaps'},
  {id:'cross-tabs', label:'Cross-Tabs'},
  {id:'clusters', label:'Clusters'}
];

const LABELS = {
  single:'Single Monument', ensemble:'Ensemble', urban:'Urban / Living', landscape:'Landscape',
  ancient:'Ancient', multiperiod:'Multi-period', modern:'Modern', prehistoric:'Prehistoric', medieval:'Medieval',
  'commemoration-dominant':'Commemoration', 'archaeological-dominant':'Archaeological', 'living-heritage':'Living Heritage',
  regional:'Regional', national:'National', international:'International', local:'Local',
  lakeshore_cluster:'Lakeshore Cluster', hilltop_isolate:'Hilltop Isolate', valley_embedded:'Valley Embedded',
  'event-memorial':'Event-Memorial', 'place-as-character':'Place-as-Character',
  qual_legal:'Qualitative / Legal', criteria_list:'Criteria List', quant_score:'Quantitative Score',
  archaeological_and_textual:'Archaeological + Textual', tradition_and_landscape:'Tradition + Landscape', tradition_only:'Tradition Only'
};
function humanLabel(key) { return LABELS[key] || String(key).replace(/[-_]/g,' ').replace(/\b\w/g,c=>c.toUpperCase()); }

// Bidi: detect RTL text and set dir attribute
function detectDir(text) {
  if (!text) return 'ltr';
  const rtlRe = /[\u0590-\u05FF\u0600-\u06FF\u0700-\u074F]/;
  return rtlRe.test(text.charAt(0)) || (text.length > 1 && rtlRe.test(text.charAt(1))) ? 'rtl' : 'ltr';
}
function bidiSpan(text) {
  const dir = detectDir(text);
  return dir === 'rtl' ? `<span dir="rtl">${text}</span>` : text;
}

// ─── STATE ───
let SITES = [];
let META = {};
let map, siteMarkers = {};
let mapInitialized = false;
let crossTabsInitialized = false;
let previousTab = null;
let currentTab = 0;

// ─── GUIDE BOX BUILDER ───
function guideBox(id, sections) {
  const stored = localStorage.getItem('guide_' + id);
  const isOpen = stored === null ? true : stored === 'open';
  return `
    <div class="guide-box ${isOpen ? 'open' : ''}" id="guide-${id}">
      <div class="guide-header" onclick="toggleGuide('${id}')">
        <div class="guide-icon">i</div>
        <div class="guide-title">How to read this tab</div>
        <div class="guide-chevron">▼</div>
      </div>
      <div class="guide-body">
        ${sections.see ? `<div class="guide-section"><div class="guide-label">What you see</div>${sections.see}</div>` : ''}
        ${sections.interact ? `<div class="guide-section"><div class="guide-label">How to interact</div>${sections.interact}</div>` : ''}
        ${sections.insight ? `<div class="guide-insight">${sections.insight}</div>` : ''}
      </div>
    </div>`;
}
function toggleGuide(id) {
  const box = document.getElementById('guide-' + id);
  box.classList.toggle('open');
  localStorage.setItem('guide_' + id, box.classList.contains('open') ? 'open' : 'closed');
}

// ─── CHART HELPERS ───
function chartOpts(pos='bottom') {
  return {plugins:{legend:{position:pos,labels:{font:{family:'Inter',size:11},usePointStyle:true,pointStyle:'circle'}}},responsive:true,maintainAspectRatio:false};
}
function stackedOpts() {
  return {
    plugins:{legend:{position:'bottom',labels:{font:{family:'Inter',size:10},usePointStyle:true,pointStyle:'circle'}}},
    scales:{x:{stacked:true,ticks:{font:{family:'Inter',size:11}}},y:{stacked:true,beginAtZero:true,ticks:{stepSize:1,font:{family:'JetBrains Mono',size:11}}}},
    responsive:true, maintainAspectRatio:false
  };
}

// ─── LOAD DATA ───
async function loadData() {
  try {
    const resp = await fetch('kinneret_sites_dataset.json');
    const data = await resp.json();
    META = data.metadata;
    SITES = data.sites.map(s => ({
      id: s.id,
      name: s.name,
      lat: s.lat,
      lng: s.lng,
      country: s.country,
      region: s.region,
      type: s.type,
      typeCategory: s.typeCategory,
      period: s.period,
      periodCategory: s.periodCategory,
      description: s.description,
      significanceSummary: s.significanceSummary,
      highlight: s.highlight,
      values: s.values,
      valueSpecs: (s.valueSpecifications || []).map(vs => ({
        type: vs.type,
        text: vs.specification,
        evidence: vs.evidence
      })),
      integrity: s.integrity,
      integrityNote: s.integrityNote,
      threats: s.threats || [],
      threatNote: s.threatNote,
      ownership: s.ownership || [],
      ownershipCount: s.ownershipCount || 1,
      method: s.method,
      methodType: s.methodType,
      comparativeBasis: s.comparativeBasis,
      claimScope: s.claimScope,
      premises: s.significancePremises || [],
      argumentType: s.argumentType,
      argumentStrength: s.argumentStrength,
      argumentNote: s.argumentStrengthNote || '',
      evidenceBasis: s.evidenceBasis,
      heritageCharacter: s.heritageCharacter,
      landscapeRel: s.landscapeRelationship,
      clusters: s.managementClusters || [],
      doc: s.documentationCompleteness || {},
      ntReferences: s.ntReferences || [],
      ntEventType: s.ntEventType || '',
      keyDates: s.keyDates || []
    }));
    init();
  } catch (e) {
    // Fallback: show error
    document.getElementById('dash-title').textContent = 'Error loading data';
    console.error('Failed to load dataset:', e);
  }
}

// ─── INIT ───
function init() {
  // Header
  document.getElementById('dash-title').textContent = META.collection || 'Collection Dashboard';
  const meta = document.getElementById('header-meta');
  const countries = [...new Set(SITES.map(s => s.country))];
  const regions = [...new Set(SITES.map(s => s.region).filter(Boolean))];
  meta.innerHTML = `
    <span>${SITES.length} sites</span>
    <span><span class="depth-badge">${(META.depth || 'RICH').toUpperCase()}</span></span>
    <span>${countries.join(', ')}${regions.length ? ' · ' + regions.join(', ') : ''}</span>
    <span>${META.generatedDate || new Date().toISOString().slice(0,10)}</span>
  `;

  // Tab bar
  const tabBar = document.getElementById('tab-bar');
  tabBar.innerHTML = TABS.map((t,i) =>
    `<button class="tab-btn${i===0?' active':''}" onclick="switchTab(${i})">${t.label}</button>`
  ).join('');

  // Build all tabs
  buildOverview();
  buildMap();
  buildValues();
  buildArguments();
  buildGaps();
  buildCrossTabs();
  buildClusters();

  // Restore tab from URL hash
  const hashIdx = TABS.findIndex(t => '#'+t.id === location.hash);
  if (hashIdx > 0) switchTab(hashIdx, true);
}

// ─── TAB SWITCHING ───
function switchTab(idx, fromNav) {
  if (currentTab !== idx && !fromNav) previousTab = currentTab;
  currentTab = idx;
  document.querySelectorAll('.tab-content').forEach((t,i) => t.classList.toggle('active', i===idx));
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', i===idx));

  // Deferred inits
  if (idx===1 && !mapInitialized) initMap();
  if (idx===5 && !crossTabsInitialized) { initCrossTabCharts(); crossTabsInitialized = true; }

  history.pushState(null, '', '#' + TABS[idx].id);
  updateBackPill(idx, fromNav);
}

function updateBackPill(idx, fromNav) {
  document.querySelectorAll('.back-pill').forEach(p => p.remove());
  if (!fromNav && previousTab !== null && previousTab !== idx && previousTab >= 0) {
    const tabEl = document.querySelectorAll('.tab-content')[idx];
    const pill = document.createElement('button');
    pill.className = 'back-pill';
    pill.textContent = '← Back to ' + TABS[previousTab].label;
    pill.onclick = () => { switchTab(previousTab, true); previousTab = null; };
    tabEl.insertBefore(pill, tabEl.firstChild);
  }
}

window.addEventListener('hashchange', () => {
  const idx = TABS.findIndex(t => '#'+t.id === location.hash);
  if (idx >= 0) switchTab(idx, true);
});

// ─── NAVIGATE TO SITE ───
function navigateToSite(siteId, targetTab) {
  const site = SITES.find(s => s.id === siteId);
  if (!site) return;
  if (targetTab === 'values') {
    switchTab(2);
    showValueSpecs(siteId);
  } else {
    switchTab(1);
    if (!mapInitialized) initMap();
    setTimeout(() => { if (siteMarkers[siteId]) siteMarkers[siteId].openPopup(); }, 250);
  }
}

// ═══════════════════════════════════════════════════════
// TAB 0: OVERVIEW
// ═══════════════════════════════════════════════════════
function buildOverview() {
  const el = document.getElementById('tab-overview');
  const countries = [...new Set(SITES.map(s => s.country))];
  const strongCount = SITES.filter(s => s.argumentStrength === 'strong').length;
  const avgDoc = Math.round(SITES.reduce((sum,s) => sum + (s.doc.score||0), 0) / SITES.length);
  const methods = [...new Set(SITES.map(s => s.methodType || 'qual_legal'))];

  // Time span: extract earliest and latest from period strings
  const allPeriods = SITES.map(s => s.period).filter(Boolean);
  let timeSpan = '—';
  if (allPeriods.length) {
    // Sort and take first/last meaningful fragment
    const starts = allPeriods.map(p => p.split(/[–—]/)[0].trim()).sort();
    const ends = allPeriods.map(p => { const parts = p.split(/[–—]/); return parts[parts.length-1].trim(); }).sort();
    timeSpan = starts[0] + ' – ' + ends[ends.length-1];
  }

  el.innerHTML = guideBox('overview', {
    see: 'KPI cards show high-level collection statistics. Distribution charts below break the collection down by site type, period, heritage character, and claim scope.',
    interact: 'Hover over chart segments for counts. Use other tabs for detail.',
    insight: 'Look for imbalances: if most sites cluster in one type or period, the collection may have representation gaps.'
  }) + `
    <div class="kpi-grid">
      <div class="kpi-card"><div class="kpi-value">${SITES.length}</div><div class="kpi-label">Sites</div></div>
      <div class="kpi-card"><div class="kpi-value">${countries.length}</div><div class="kpi-label">${countries.length===1?'Country':'Countries'}</div></div>
      <div class="kpi-card"><div class="kpi-value small">${timeSpan}</div><div class="kpi-label">Time Span</div></div>
      <div class="kpi-card"><div class="kpi-value">${methods.length}</div><div class="kpi-label">Method Type${methods.length!==1?'s':''}</div></div>
      <div class="kpi-card"><div class="kpi-value">${strongCount}</div><div class="kpi-label">Strong Arguments</div></div>
      <div class="kpi-card"><div class="kpi-value">${avgDoc}%</div><div class="kpi-label">Avg. Documentation</div></div>
    </div>
    <div class="chart-grid">
      <div class="chart-card"><h3>By Site Type</h3><canvas id="chart-type" height="220"></canvas></div>
      <div class="chart-card"><h3>By Period</h3><canvas id="chart-period" height="220"></canvas></div>
      <div class="chart-card"><h3>By Heritage Character</h3><canvas id="chart-character" height="220"></canvas></div>
      <div class="chart-card"><h3>By Claim Scope</h3><canvas id="chart-scope" height="220"></canvas></div>
    </div>`;

  if (typeof Chart === 'undefined') return;
  const amber5 = ['#fbbf24','#f59e0b','#d97706','#b45309','#92400e'];
  const stone5 = ['#a8a29e','#78716c','#57534e','#44403c','#292524'];
  const mixed3 = ['#d97706','#78716c','#f59e0b'];

  function doughnut(id, field, colors) {
    const counts = {};
    SITES.forEach(s => { const k = s[field]; counts[k]=(counts[k]||0)+1; });
    new Chart(document.getElementById(id), {
      type:'doughnut',
      data:{labels:Object.keys(counts).map(humanLabel), datasets:[{data:Object.values(counts), backgroundColor:colors.slice(0,Object.keys(counts).length)}]},
      options:chartOpts()
    });
  }
  doughnut('chart-type','typeCategory',amber5);
  doughnut('chart-period','periodCategory',stone5);
  doughnut('chart-character','heritageCharacter',mixed3);
  doughnut('chart-scope','claimScope',['#fbbf24','#d97706','#92400e','#44403c']);
}

// TAB 1: MAP
// ═══════════════════════════════════════════════════════
function buildMap() {
  const el = document.getElementById('tab-map');
  el.innerHTML = guideBox('map', {
    see: 'Circle markers on the map. Size reflects the number of explicit values (larger = more documented values). Color is uniform; opacity changes when filtered.',
    interact: 'Click a value-type filter button to dim sites where that value is absent. Click a marker for a popup with significance summary and value indicators. Click "All" to reset.',
    insight: 'The lakeside cluster (Beatitudes–Tabgha–Capernaum–Magdala) forms a dense sacred corridor. Mt. Tabor and Kafr Kanna are geographic outliers — different governance context.'
  }) + `
    <div class="map-filters">
      <button class="filter-btn active" onclick="filterMap('all')">All</button>
      ${VALUE_TYPES.map(v => `<button class="filter-btn" onclick="filterMap('${v}')">${v}</button>`).join('')}
    </div>
    <div id="map-container"></div>`;
}

function initMap() {
  if (typeof L === 'undefined') {
    document.getElementById('map-container').innerHTML = '<div style="padding:40px;text-align:center;color:var(--red-500);">Leaflet failed to load. Check your internet connection.</div>';
    return;
  }
  const center = [
    SITES.reduce((s,site)=>s+site.lat,0)/SITES.length,
    SITES.reduce((s,site)=>s+site.lng,0)/SITES.length
  ];
  map = L.map('map-container').setView(center, 11);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution:'&copy; <a href="https://openstreetmap.org">OpenStreetMap</a>'
  }).addTo(map);

  SITES.forEach(s => {
    const explicitCount = Object.values(s.values).filter(v=>v==='e').length;
    const radius = 8 + explicitCount * 3;
    const marker = L.circleMarker([s.lat, s.lng], {
      radius, fillColor:'#d97706', color:'#92400e',
      weight:2, opacity:1, fillOpacity:0.7
    }).addTo(map);

    const valueDots = VALUE_TYPES.map(v => {
      const lv = s.values[v];
      const dot = lv==='e'?'●':lv==='i'?'◐':'○';
      const color = lv==='e'?VALUE_COLORS[v]:lv==='i'?'#a8a29e':'#e7e5e4';
      return `<span style="color:${color};" title="${v}: ${lv==='e'?'explicit':lv==='i'?'implied':'absent'}">${dot} <span style="color:#78716c;font-size:0.65rem;">${v}</span></span>`;
    }).join(' ');

    marker.bindPopup(`
      <div style="font-family:Inter,sans-serif;max-width:300px;" dir="${detectDir(s.name)}">
        <strong style="font-size:0.95rem;color:#44403c;">${bidiSpan(s.name)}</strong>
        <div style="font-size:0.72rem;color:#a8a29e;margin:2px 0;">${humanLabel(s.typeCategory)} · ${humanLabel(s.heritageCharacter)} · ${humanLabel(s.claimScope)}</div>
        <div style="font-size:0.8rem;color:#57534e;margin:6px 0;line-height:1.4;">${s.significanceSummary}</div>
        <div style="font-size:0.78rem;color:#b45309;font-style:italic;margin-bottom:8px;">${s.highlight}</div>
        <div style="display:flex;flex-wrap:wrap;gap:4px 10px;font-size:0.7rem;">${valueDots}</div>
        <div style="margin-top:8px;font-size:0.72rem;">
          <a style="color:#b45309;cursor:pointer;text-decoration:underline;" onclick="navigateToSite('${s.id}','values')">View value specifications →</a>
        </div>
      </div>
    `, {maxWidth:320});

    marker._siteData = s;
    siteMarkers[s.id] = marker;
  });
  mapInitialized = true;
}

function filterMap(valueType) {
  document.querySelectorAll('.map-filters .filter-btn').forEach(b => {
    b.classList.toggle('active', b.textContent === (valueType==='all'?'All':valueType));
  });
  if (!mapInitialized) return;
  Object.values(siteMarkers).forEach(marker => {
    const s = marker._siteData;
    const explicitCount = Object.values(s.values).filter(v=>v==='e').length;
    const baseRadius = 8 + explicitCount * 3;
    if (valueType === 'all') {
      marker.setRadius(baseRadius);
      marker.setStyle({fillOpacity:0.7, opacity:1});
    } else {
      const level = s.values[valueType];
      if (level === 'e' || level === 'i') {
        marker.setRadius(baseRadius);
        marker.setStyle({fillOpacity:0.8, opacity:1});
      } else {
        marker.setRadius(baseRadius * 0.5);
        marker.setStyle({fillOpacity:0.08, opacity:0.15});
      }
    }
  });
}

// ═══════════════════════════════════════════════════════
// TAB 2: VALUES
// ═══════════════════════════════════════════════════════
function buildValues() {
  const el = document.getElementById('tab-values');
  const counts = {};
  VALUE_TYPES.forEach(v => counts[v]={e:0,i:0,a:0});

  const rows = SITES.map(s => {
    const cells = VALUE_TYPES.map(v => {
      const lv = s.values[v];
      counts[v][lv]++;
      const dot = lv==='e'?'●':lv==='i'?'◐':'○';
      const cls = lv==='e'?'explicit':lv==='i'?'implied':'absent';
      return `<td class="value-dot ${cls}" title="${v}: ${lv==='e'?'Explicit':lv==='i'?'Implied':'Absent'}">${dot}</td>`;
    }).join('');
    return `<tr><td onclick="showValueSpecs('${s.id}')" style="cursor:pointer;"><span class="site-link">${bidiSpan(s.name)}</span></td>${cells}</tr>`;
  }).join('');

  const footer = VALUE_TYPES.map(v =>
    `<span style="color:${VALUE_COLORS[v]};">● ${v}: ${counts[v].e}e ${counts[v].i}i ${counts[v].a}a</span>`
  ).join('');

  el.innerHTML = guideBox('values', {
    see: 'A matrix of sites × value types. ● = explicit (stated in the source), ◐ = implied (inferable), ○ = absent. Footer summarizes counts per value type.',
    interact: 'Click any site name to expand its <strong>value specifications</strong> — what each value concretely means at that site, not just whether it\'s present.',
    insight: 'Tabgha is the only site with all 8 values explicit. Nature values are the weakest across the collection (3 absent). Intangible values are the most consistently documented.'
  }) + `
    <div class="card" style="overflow-x:auto;padding-bottom:0;">
      <table><thead><tr>
        <th style="min-width:140px;">Site</th>
        ${VALUE_TYPES.map(v => `<th style="text-align:center;">${v}</th>`).join('')}
      </tr></thead>
      <tbody>${rows}</tbody></table>
      <div class="footer-counts">${footer}</div>
    </div>
    <div class="value-spec-panel" id="value-spec-panel">
      <h4 id="spec-panel-title"></h4>
      <div id="spec-panel-content"></div>
    </div>`;
}

function showValueSpecs(siteId) {
  const site = SITES.find(s => s.id === siteId);
  if (!site) return;
  const panel = document.getElementById('value-spec-panel');
  document.getElementById('spec-panel-title').innerHTML =
    `Value Specifications — ${bidiSpan(site.name)} <button class="close-btn" onclick="closeValueSpecs()">Close</button>`;
  document.getElementById('spec-panel-content').innerHTML = site.valueSpecs.map(vs => `
    <div class="value-spec-item">
      <div class="spec-type">${vs.type} <span style="font-weight:400;color:var(--stone-400);font-size:0.72rem;">[${vs.evidence}]</span></div>
      <div class="spec-text">${vs.text}</div>
    </div>
  `).join('') || '<div style="color:var(--stone-400);font-size:0.82rem;">No value specifications extracted for this site.</div>';
  panel.classList.add('open');
  panel.scrollIntoView({behavior:'smooth', block:'nearest'});
}

function closeValueSpecs() {
  document.getElementById('value-spec-panel').classList.remove('open');
}

// TAB 3: ARGUMENTS
// ═══════════════════════════════════════════════════════
function buildArguments() {
  const el = document.getElementById('tab-arguments');
  const rows = SITES.map(s => {
    const cls = 'strength-' + s.argumentStrength;
    return `<tr>
      <td><span class="site-link" onclick="navigateToSite('${s.id}','map')">${bidiSpan(s.name)}</span></td>
      <td>${humanLabel(s.argumentType)}</td>
      <td><span class="strength-badge ${cls}">${s.argumentStrength}</span></td>
      <td>${humanLabel(s.evidenceBasis)}</td>
      <td>${humanLabel(s.claimScope)}</td>
      <td style="font-size:0.78rem;color:var(--stone-500);max-width:260px;">${s.argumentNote}</td>
    </tr>`;
  }).join('');

  el.innerHTML = guideBox('arguments', {
    see: 'Two charts summarize the types of significance premises used and the geographic scope of claims. The table below details each site\'s argument: its type, strength, evidence basis, and where the argument is most vulnerable.',
    interact: 'Click a site name to see it on the map. Strength badges are color-coded: <span style="color:#16a34a;">green</span> = strong, <span style="color:#b45309;">amber</span> = moderate, <span style="color:#dc2626;">red</span> = weak.',
    insight: 'Strong arguments correlate with archaeological + textual evidence. The two moderate and one weak argument all depend on tradition without archaeological corroboration — this is the collection\'s evidential fault line.'
  }) + `
    <div class="chart-grid" style="margin-bottom:24px;">
      <div class="chart-card"><h3>Significance Premises</h3><canvas id="chart-premises" height="220"></canvas></div>
      <div class="chart-card"><h3>Claim Scope Distribution</h3><canvas id="chart-claim-scope" height="220"></canvas></div>
    </div>
    <div class="card" style="overflow-x:auto;">
      <table><thead><tr>
        <th>Site</th><th>Argument Type</th><th>Strength</th><th>Evidence Basis</th><th>Claim Scope</th><th>Weak Link</th>
      </tr></thead>
      <tbody>${rows}</tbody></table>
    </div>`;

  if (typeof Chart === 'undefined') return;

  // Premises bar chart
  const premiseCounts = {};
  SITES.forEach(s => s.premises.forEach(p => { premiseCounts[p]=(premiseCounts[p]||0)+1; }));
  const premiseKeys = Object.keys(premiseCounts).sort((a,b) => premiseCounts[b]-premiseCounts[a]);
  new Chart(document.getElementById('chart-premises'), {
    type:'bar',
    data:{labels:premiseKeys.map(humanLabel), datasets:[{data:premiseKeys.map(k=>premiseCounts[k]), backgroundColor:'#d97706', borderRadius:6}]},
    options:{indexAxis:'y',plugins:{legend:{display:false}},scales:{x:{beginAtZero:true,ticks:{stepSize:1,font:{family:'JetBrains Mono'}}},y:{ticks:{font:{family:'Inter',size:11}}}},responsive:true,maintainAspectRatio:false}
  });

  // Claim scope doughnut
  const scopeCounts = {};
  SITES.forEach(s => { scopeCounts[s.claimScope]=(scopeCounts[s.claimScope]||0)+1; });
  new Chart(document.getElementById('chart-claim-scope'), {
    type:'doughnut',
    data:{labels:Object.keys(scopeCounts).map(humanLabel), datasets:[{data:Object.values(scopeCounts), backgroundColor:['#fbbf24','#d97706','#92400e','#44403c']}]},
    options:chartOpts()
  });
}

// ═══════════════════════════════════════════════════════
// TAB 4: GAPS
// ═══════════════════════════════════════════════════════
function buildGaps() {
  const el = document.getElementById('tab-gaps');
  const dims = ['values','significance','integrity','threats','method','comparisons'];
  const dimLabels = {values:'Values',significance:'Significance',integrity:'Integrity',threats:'Threats',method:'Method',comparisons:'Comparisons'};

  // Determine gap status per site per dimension
  // true = green, false = red. For nuanced gaps, check if partially present.
  function gapStatus(site, dim) {
    const val = site.doc[dim];
    if (val === true) return 'green';
    if (val === false) {
      // Check if there's partial data (e.g., threats inferred but not stated)
      if (dim === 'threats' && site.threats.length > 0) return 'yellow';
      if (dim === 'integrity' && site.integrityNote) return 'yellow';
      if (dim === 'method' && site.methodType) return 'yellow';
      return 'red';
    }
    return 'red';
  }

  const rows = SITES.map(s => {
    const cells = dims.map(d => {
      const status = gapStatus(s, d);
      const cls = 'gap-' + status;
      const label = status === 'green' ? '✓' : status === 'yellow' ? '~' : '✗';
      const title = status === 'green' ? 'Present' : status === 'yellow' ? 'Partial / inferred' : 'Absent';
      return `<td><span class="gap-cell ${cls}" title="${title}">${label}</span></td>`;
    }).join('');
    const score = s.doc.score || 0;
    const scoreColor = score >= 60 ? 'var(--green-600)' : score >= 40 ? 'var(--amber-600)' : 'var(--red-500)';
    return `<tr>
      <td><span class="site-link" onclick="navigateToSite('${s.id}','map')">${bidiSpan(s.name)}</span></td>
      ${cells}
      <td style="font-family:'JetBrains Mono';font-weight:600;color:${scoreColor};">${score}%</td>
    </tr>`;
  }).join('');

  el.innerHTML = guideBox('gaps', {
    see: 'Traffic-light matrix: green (✓) = documented, yellow (~) = partial or inferred, red (✗) = absent. The score column shows overall documentation completeness per site.',
    interact: 'Click a site name to see its map location. Look for columns that are consistently red — these are collection-wide documentation gaps that need priority attention.',
    insight: 'Threats and Method are red across the entire collection — no site explicitly documents either. This is the most urgent documentation gap for any nomination or management planning exercise.'
  }) + `
    <div class="card" style="overflow-x:auto;">
      <table><thead><tr>
        <th>Site</th>
        ${dims.map(d => `<th style="text-align:center;">${dimLabels[d]}</th>`).join('')}
        <th style="text-align:center;">Score</th>
      </tr></thead>
      <tbody>${rows}</tbody></table>
    </div>`;
}

// ═══════════════════════════════════════════════════════
// TAB 5: CROSS-TABS
// ═══════════════════════════════════════════════════════
function buildCrossTabs() {
  const el = document.getElementById('tab-cross-tabs');
  el.innerHTML = guideBox('cross-tabs', {
    see: 'Stacked bar charts cross-tabulating explicit values against heritage character, argument strength, landscape relationship, and per-site counts. Each color represents a value type — consistent across all charts.',
    interact: 'Hover over bar segments for exact counts. Compare bar heights to see which site categories carry the most documented values.',
    insight: 'Archaeological-dominant sites carry the densest value documentation. The "weak argument" category (Kafr Kanna) still has significant explicit values — weak evidence ≠ low significance.'
  }) + `
    <div class="chart-grid">
      <div class="chart-card"><h3>Values × Heritage Character</h3><canvas id="chart-xt-character" height="280"></canvas></div>
      <div class="chart-card"><h3>Values × Argument Strength</h3><canvas id="chart-xt-strength" height="280"></canvas></div>
      <div class="chart-card"><h3>Values × Landscape Relationship</h3><canvas id="chart-xt-landscape" height="280"></canvas></div>
      <div class="chart-card"><h3>Explicit Values per Site</h3><canvas id="chart-xt-explicit" height="280"></canvas></div>
    </div>`;
}

function initCrossTabCharts() {
  if (typeof Chart === 'undefined') return;

  function stackedBar(canvasId, groupField) {
    const groups = [...new Set(SITES.map(s => s[groupField]))];
    const datasets = VALUE_TYPES.map((v,i) => ({
      label: v,
      data: groups.map(g => SITES.filter(s => s[groupField]===g && s.values[v]==='e').length),
      backgroundColor: DISTINCT_COLORS[i]
    }));
    new Chart(document.getElementById(canvasId), {
      type:'bar',
      data:{labels:groups.map(humanLabel), datasets},
      options:stackedOpts()
    });
  }

  stackedBar('chart-xt-character','heritageCharacter');
  stackedBar('chart-xt-strength','argumentStrength');
  stackedBar('chart-xt-landscape','landscapeRel');

  // Explicit values per site (horizontal bar)
  const explData = SITES.map(s => ({
    name: s.name,
    count: Object.values(s.values).filter(v=>v==='e').length
  })).sort((a,b) => b.count - a.count);

  new Chart(document.getElementById('chart-xt-explicit'), {
    type:'bar',
    data:{
      labels:explData.map(d=>d.name),
      datasets:[{data:explData.map(d=>d.count), backgroundColor:'#d97706', borderRadius:6}]
    },
    options:{
      indexAxis:'y',
      plugins:{legend:{display:false}},
      scales:{x:{beginAtZero:true,max:8,ticks:{stepSize:1,font:{family:'JetBrains Mono'}}},y:{ticks:{font:{family:'Inter',size:11}}}},
      responsive:true, maintainAspectRatio:false
    }
  });
}

// ═══════════════════════════════════════════════════════
// TAB 6: CLUSTERS
// ═══════════════════════════════════════════════════════
function buildClusters() {
  const el = document.getElementById('tab-clusters');

  const clusterDefs = [
    {key:'sacred_triangle_corridor', label:'Sacred Triangle Corridor',
     desc:'Capernaum–Tabgha–Beatitudes: three sites within 2 km sharing a single landscape corridor. Joint management of visual integrity, access, and visitor flow is essential.'},
    {key:'archaeological_research', label:'Archaeological Research Sites',
     desc:'Sites where significance is grounded in archaeological evidence. Ongoing excavation, conservation, and research access are primary governance concerns.'},
    {key:'landscape_integrity', label:'Landscape Integrity',
     desc:'Sites whose significance depends on visual and experiential landscape setting. Development pressure, visual intrusion, and land-use change are key threats.'},
    {key:'multi_owner_compound', label:'Multi-Owner Compounds',
     desc:'Sites with 3+ distinct owners or custodians. Coordination of conservation standards, access policies, and visitor management is the governance challenge.'},
    {key:'outlier', label:'Geographic Outlier',
     desc:'Sites physically separated from the lakeside cluster. Different landscape context, access patterns, and governance framework.'}
  ];

  const cards = clusterDefs.map(cd => {
    const sites = SITES.filter(s => s.clusters.includes(cd.key));
    if (sites.length === 0) return '';
    const tags = sites.map(s =>
      `<span class="site-tag" onclick="navigateToSite('${s.id}','map')">${bidiSpan(s.name)}</span>`
    ).join('');
    return `<div class="cluster-card">
      <h4>${cd.label}</h4>
      <div class="cluster-desc">${cd.desc}</div>
      <div>${tags}</div>
      <div style="margin-top:8px;font-size:0.72rem;color:var(--stone-400);">${sites.length} site${sites.length!==1?'s':''}</div>
    </div>`;
  }).join('');

  el.innerHTML = guideBox('clusters', {
    see: 'Management-oriented groupings derived from the data. Each card represents a governance cluster with shared management needs. Sites can appear in multiple clusters.',
    interact: 'Click any site tag to jump to its location on the map. Appearing in multiple clusters reveals governance complexity.',
    insight: 'The Sacred Triangle Corridor (Capernaum–Tabgha–Beatitudes) is the most governance-critical cluster: three owners, shared landscape, high visitor volume. No unified management plan exists.'
  }) + `<div class="cluster-grid">${cards}</div>`;
}
