* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

::-webkit-scrollbar-track { background: var(--bg); }

/* Header */
.header { background: #1e293b; padding: 16px 28px; border-bottom: 1px solid #334155; color: #f1f5f9; }

.header-sub { font-size: 0.84rem; color: #94a3b8; }

.stagebar-item { flex: 1; text-align: center; }
.stagebar-track { height: 3px; border-radius: 2px; margin-bottom: 4px; }
.stagebar-track.done { background: var(--green); }
.stagebar-track.pending { background: #e2e8f0; }
.stagebar-label { font-size: 0.65rem; font-family: 'JetBrains Mono', monospace; }

.sidebar-btn.active { background: var(--accent-light); color: var(--accent); border-left-color: var(--accent); font-weight: 600; }
.main { flex: 1; padding: 24px 28px; max-width: 920px; overflow-y: auto; }

.mb-sm { margin-bottom: 10px; }
.mb-md { margin-bottom: 16px; }
.flex-wrap { display: flex; flex-wrap: wrap; gap: 6px; }

  const legend=h('div',{className:'kg-legend'});
  types.forEach(t=>legend.appendChild(h('div',{className:'kg-legend-item'},h('div',{className:'kg-legend-dot',style:{background:KC[t]}}),KL[t]||t)));
  container.appendChild(legend);
  container.appendChild(h('div',{className:'kg-hint'},'Drag · Scroll to zoom · Click node'));
  wrap.appendChild(container);
  el.appendChild(wrap);
  requestAnimationFrame(()=>initKG(svg,container));
}

function initKG(svgEl,container) {
  const W=container.clientWidth, H=500;
  const svg=d3.select(svgEl).attr('width',W).attr('height',H);
  svg.selectAll('*').remove();
  const g=svg.append('g');
  svg.call(d3.zoom().scaleExtent([0.25,3]).on('zoom',e=>g.attr('transform',e.transform)));
  svg.append('defs').append('marker').attr('id','ka').attr('viewBox','-0 -5 10 10').attr('refX',20).attr('refY',0).attr('orient','auto').attr('markerWidth',6).attr('markerHeight',6).append('path').attr('d','M 0,-5 L 10,0 L 0,5').attr('fill','#5a6a7e');
  const nd=DATA.kg.nodes.map(n=>({...n})), ed=DATA.kg.edges.map(e=>({...e,source:e.from,target:e.to}));
  const sim=d3.forceSimulation(nd).force('link',d3.forceLink(ed).id(d=>d.id).distance(110)).force('charge',d3.forceManyBody().strength(-320)).force('center',d3.forceCenter(W/2,H/2)).force('col',d3.forceCollide().radius(42));
  const link=g.append('g').selectAll('line').data(ed).join('line').attr('stroke','#3a4a5e').attr('stroke-width',1.5).attr('marker-end','url(#ka)');
  const llab=g.append('g').selectAll('text').data(ed).join('text').attr('font-size',10).attr('fill','#7a8fa8').attr('text-anchor','middle').attr('dy',-5).attr('font-family','DM Sans, sans-serif').text(d=>d.label);
  const node=g.append('g').selectAll('g').data(nd).join('g').style('cursor','pointer')
    .call(d3.drag().on('start',(e,d)=>{if(!e.active)sim.alphaTarget(0.3).restart();d.fx=d.x;d.fy=d.y;}).on('drag',(e,d)=>{d.fx=e.x;d.fy=e.y;}).on('end',(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null;}));
  node.append('circle').attr('r',d=>d.type==='asset'?22:d.type==='cultural_value'?16:12).attr('fill',d=>KC[d.type]||'#777').attr('stroke','#0a1120').attr('stroke-width',2);
  node.filter(d=>d.type==='asset').append('text').attr('text-anchor','middle').attr('dy',5).attr('font-size',13).attr('fill','#fff').text('★');
  node.append('text').attr('dy',d=>d.type==='asset'?36:26).attr('text-anchor','middle').attr('font-size',11).attr('fill','#dde6f0').attr('font-weight','500').attr('font-family','DM Sans, sans-serif').style('text-shadow','0 1px 4px rgba(0,0,0,0.8)').text(d=>d.name.length>18?d.name.slice(0,18)+'…':d.name);

  node.on('click',function(event,d){
    event.stopPropagation(); rmPop();
    const nd=DATA.kg.nodes.find(n=>n.id===d.id); if(!nd) return;
    const sr=svgEl.getBoundingClientRect(), cr=container.getBoundingClientRect();
    const tr=d3.zoomTransform(svgEl);
    const sx=tr.applyX(d.x)-cr.left+sr.left, sy=tr.applyY(d.y)-cr.top+sr.top;
    const conns=DATA.kg.edges.filter(e=>e.from===d.id||e.to===d.id).map(e=>{const is=e.from===d.id;return{dir:is?'→':'←',verb:e.label,name:(DATA.kg.nodes.find(n=>n.id===(is?e.to:e.from)))?.name||'?'};});
    const pop=h('div',{className:'kg-popover'});
    pop.appendChild(h('button',{className:'kg-popover-close',onClick:rmPop},'✕'));
    pop.appendChild(h('div',{className:'kg-popover-name'},nd.name));
    pop.appendChild(h('div',{style:{marginBottom:'12px'}},h('span',{className:'pill pill-md',style:{background:KC[nd.type],fontSize:'0.72rem'}},KL[nd.type]||nd.type)));
    pop.appendChild(h('div',{className:'kg-popover-meaning'},nd.meaning));
    if(conns.length){const cd=h('div',{className:'kg-popover-conn'});cd.appendChild(h('div',{className:'kg-popover-conn-label'},'Connections ('+conns.length+')'));
      conns.forEach(c=>cd.appendChild(h('div',{className:'kg-popover-conn-item'},h('span',{className:'dir'},c.dir),h('span',{className:'verb'},'['+c.verb+'] '),h('span',{style:{color:'#e2e8f0'}},c.name))));pop.appendChild(cd);}
    let left=sx+30,top=sy-40;
    if(left+310>container.clientWidth-10) left=sx-340;
    if(top<10) top=10; if(top+300>500-10) top=190;
    pop.style.left=left+'px'; pop.style.top=top+'px'; container.appendChild(pop);
  });
  svg.on('click',()=>rmPop());
  function rmPop(){const p=container.querySelector('.kg-popover');if(p)p.remove();}
  sim.on('tick',()=>{link.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);llab.attr('x',d=>(d.source.x+d.target.x)/2).attr('y',d=>(d.source.y+d.target.y)/2);node.attr('transform',d=>'translate('+d.x+','+d.y+')');});
}

renderStageBar(); renderSidebar(); renderMain();
</script>
</body>
